<style>
#billing-widget{position:fixed;right:14px;bottom:14px;z-index:3000;font-family:monospace}
#billing-toggle{background:#1e40af;color:#fff;border:none;padding:10px 12px;border-radius:10px;cursor:pointer;font-weight:700}
#billing-panel{display:none;margin-top:8px;width:320px;max-height:70vh;overflow:auto;background:#0D1425;color:#E2E8F0;border:1px solid #334155;border-radius:12px;padding:12px;box-shadow:0 10px 30px rgba(0,0,0,.4)}
#billing-panel h4{font-size:12px;margin:0 0 8px;letter-spacing:1px;color:#93c5fd}
#billing-panel select,#billing-panel input,#billing-panel button{width:100%;margin:6px 0;padding:8px;border-radius:8px;border:1px solid #334155;background:#0b1220;color:#e2e8f0;font-family:monospace}
#billing-panel button.action{background:#1d4ed8;border:none;color:white;font-weight:700;cursor:pointer}
#billing-log{font-size:11px;white-space:pre-wrap;background:#020617;padding:8px;border-radius:8px;border:1px solid #1e293b;min-height:80px}
</style>
<div id="billing-widget">
  <button id="billing-toggle">💳 Worksheet Billing</button>
  <div id="billing-panel">
    <h4>WORKSHEET PAYMENT UI</h4>
    <label>Worksheet</label>
    <select id="ws-select"></select>
    <label>Payment mode</label>
    <select id="pay-mode">
      <option value="card">Card</option>
      <option value="wallet">Wallet</option>
      <option value="bank_transfer">Bank Transfer</option>
    </select>
    <label>Amount (USD)</label>
    <input id="pay-amount" type="number" min="0" step="0.01" placeholder="Auto from quote">
    <button class="action" id="btn-quote">1) Get Quote</button>
    <button class="action" id="btn-free">2) Try Access (free gate)</button>
    <button class="action" id="btn-pay">3) Pay (full or partial)</button>
    <button class="action" id="btn-ent">4) Load Entitlements</button>
    <button class="action" id="btn-stats">5) Load Quiz Stats</button>
    <div id="billing-log">Ready.</div>
  </div>
</div>
<script>
(function(){
  const BASE = (window.SP_CONFIG && window.SP_CONFIG.BILLING_API_BASE) || 'http://localhost:8787';
  const accountId = 'acct_demo';
  const studentId = 'stu_demo';
  let currentQuote = null;
  const $ = (id)=>document.getElementById(id);
  const log = (obj)=>{ $('billing-log').textContent = typeof obj === 'string' ? obj : JSON.stringify(obj,null,2); };

  $('billing-toggle').onclick = ()=>{
    const p = $('billing-panel');
    p.style.display = p.style.display === 'block' ? 'none' : 'block';
  };

  async function api(path, method='GET', body){
    const r = await fetch(BASE + path, {
      method,
      headers: {'Content-Type':'application/json'},
      body: body ? JSON.stringify(body) : undefined
    });
    const json = await r.json();
    if(!r.ok) throw json;
    return json;
  }

  async function loadWorksheets(){
    try {
      const data = await api('/api/worksheets');
      $('ws-select').innerHTML = data.worksheets.map(w=>`<option value="${w.id}">${w.id} — ${w.title} ($${(w.price_cents/100).toFixed(2)})</option>`).join('');
      log({status:'worksheets_loaded', count:data.worksheets.length});
    } catch(e){
      log({error:'Failed to load worksheets', detail:e, tip:'Start backend/server.py'});
    }
  }

  $('btn-quote').onclick = async ()=>{
    try {
      currentQuote = await api('/billing/quote','POST',{accountId, studentId, worksheetId:$('ws-select').value});
      if(!$('pay-amount').value) $('pay-amount').value = (currentQuote.payableCents/100).toFixed(2);
      log(currentQuote);
    } catch(e){ log(e); }
  };

  $('btn-free').onclick = async ()=>{
    try {
      const data = await api('/billing/access-worksheet','POST',{accountId, studentId, worksheetId:$('ws-select').value});
      log(data);
    } catch(e){ log(e); }
  };

  $('btn-pay').onclick = async ()=>{
    try {
      if(!currentQuote){
        currentQuote = await api('/billing/quote','POST',{accountId, studentId, worksheetId:$('ws-select').value});
      }
      const amountCents = Math.round(Number($('pay-amount').value || 0) * 100);
      const total = currentQuote.payableCents;
      const order = await api('/billing/order','POST',{
        accountId, studentId, worksheetId:$('ws-select').value,
        totalCents: total
      });
      const payment = await api('/billing/payments/initiate','POST',{
        orderId: order.orderId,
        mode: $('pay-mode').value,
        amountCents
      });
      const settled = await api('/billing/payments/webhook','POST',{
        paymentId: payment.paymentId,
        status:'succeeded'
      });
      const allocation = await api('/billing/allocate-partial','POST',{orderId: order.orderId});
      log({order,payment,settled,allocation});
    } catch(e){ log(e); }
  };

  $('btn-ent').onclick = async ()=>{
    try {
      const data = await api(`/billing/entitlements?accountId=${accountId}&studentId=${studentId}`);
      log(data);
    } catch(e){ log(e); }
  };

  $('btn-stats').onclick = async ()=>{
    try {
      const data = await api(`/api/students/${studentId}/stats`);
      log(data);
    } catch(e){ log(e); }
  };

  loadWorksheets();
})();
</script>

<script>
(function(){
  const BASE = (window.SP_CONFIG && window.SP_CONFIG.BILLING_API_BASE) || 'http://localhost:8787';

  window.SP_API = window.SP_API || {};
  window.SP_API.submitQuizResult = async function submitQuizResult(payload){
    const response = await fetch(`${BASE}/api/quiz-results`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(payload || {})
    });
    const json = await response.json();
    if(!response.ok) throw json;
    return json;
  };

  window.SP_API.fetchDashboardStats = async function fetchDashboardStats(studentId){
    if(!studentId) throw new Error('studentId is required');
    const response = await fetch(`${BASE}/api/students/${encodeURIComponent(studentId)}/stats`);
    const json = await response.json();
    if(!response.ok) throw json;
    return json;
  };
})();
</script>
